name: Build & Deploy Site

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "src/**"
      - "static/**"
      - "svelte.config.js"
      - "package.json"
      - ".github/workflows/build-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build SvelteKit site
        run: bun run build
        # meta.json is generated as a prerendered endpoint at build/meta.json
        # images are in static/images/ → copied to build/images/ automatically

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
